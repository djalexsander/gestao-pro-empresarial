name: Desktop Release (Windows)

# Dispara quando uma tag vX.Y.Z é criada, OU manualmente via "Run workflow".
# Faz o build assinado do Tauri (npm run tauri:build:signed), gera o latest.json
# e publica os instaladores .exe / .exe.sig + latest.json na GitHub Release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: v1.1.1). Se vazio, usa a versão do package.json."
        required: false
        default: ""

permissions:
  contents: write # necessário para criar/editar releases

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      - name: Resolver versão / tag
        id: ver
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v${PKG_VERSION}"
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Versão package.json: ${PKG_VERSION}"
          echo "Tag da release:     ${TAG}"

      - name: Build assinado (Tauri + latest.json)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build:signed

      - name: Listar artefatos NSIS
        shell: bash
        run: ls -la src-tauri/target/release/bundle/nsis/

      - name: Publicar na GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
