name: Desktop Release (Windows)

# Dispara quando uma tag vX.Y.Z é criada, OU manualmente via "Run workflow".
# Faz o build assinado do Tauri com diagnóstico verbose, gera o latest.json
# e publica os instaladores .exe/.msi + assinaturas + latest.json na GitHub Release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: v1.1.1). Se vazio, usa a versão do package.json."
        required: false
        default: ""
      tauri_targets:
        description: "Diagnóstico do empacotamento Tauri"
        required: false
        default: "separate"
        type: choice
        options:
          - separate
          - nsis
          - msi
          - all
      disable_updater_artifacts:
        description: "Diagnóstico: desativar createUpdaterArtifacts temporariamente"
        required: false
        default: false
        type: boolean

permissions:
  contents: write # necessário para criar/editar releases

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      - name: Resolver versão / tag
        id: ver
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v${PKG_VERSION}"
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Versão package.json: ${PKG_VERSION}"
          echo "Tag da release:     ${TAG}"

      - name: Validar chave do updater
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $secret = $env:TAURI_SIGNING_PRIVATE_KEY
          Write-Host "Secret carregado com tamanho:" $secret.Length
          Write-Host "Senha carregada:" ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Length -gt 0)
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($secret)
          $hash = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
          $hashText = -join ($hash | ForEach-Object { $_.ToString("x2") })
          Write-Host "SHA256 da chave privada carregada no Actions:"
          Write-Host $hashText

      - name: Build frontend desktop
        timeout-minutes: 10
        shell: bash
        run: |
          echo "[step] build frontend desktop iniciado: $(date -u +%FT%TZ)"
          npm run build:desktop
          echo "[step] build frontend desktop concluído: $(date -u +%FT%TZ)"

      - name: Build Tauri diagnóstico — NSIS
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tauri_targets == '' || github.event.inputs.tauri_targets == 'separate' || github.event.inputs.tauri_targets == 'nsis' }}
        timeout-minutes: 20
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DISABLE_UPDATER_ARTIFACTS: ${{ github.event.inputs.disable_updater_artifacts || 'false' }}
        shell: pwsh
        run: |
          Write-Host "::group::tauri build verbose — target nsis"
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-tauri-build-watchdog.ps1 -Target nsis -NoOutputTimeoutSeconds 900 -DisableUpdaterArtifacts:([System.Convert]::ToBoolean($env:DISABLE_UPDATER_ARTIFACTS))
          Write-Host "::endgroup::"

      - name: Build Tauri diagnóstico — MSI/WiX
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tauri_targets == 'separate' || github.event.inputs.tauri_targets == 'msi' }}
        timeout-minutes: 20
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DISABLE_UPDATER_ARTIFACTS: ${{ github.event.inputs.disable_updater_artifacts || 'false' }}
        shell: pwsh
        run: |
          Write-Host "::group::tauri build verbose — target msi/wix"
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-tauri-build-watchdog.ps1 -Target msi -NoOutputTimeoutSeconds 900 -DisableUpdaterArtifacts:([System.Convert]::ToBoolean($env:DISABLE_UPDATER_ARTIFACTS))
          Write-Host "::endgroup::"

      - name: Build Tauri diagnóstico — all targets
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tauri_targets == 'all' }}
        timeout-minutes: 20
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DISABLE_UPDATER_ARTIFACTS: ${{ github.event.inputs.disable_updater_artifacts || 'false' }}
        shell: pwsh
        run: |
          Write-Host "::group::tauri build verbose — all targets"
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-tauri-build-watchdog.ps1 -Target all -NoOutputTimeoutSeconds 900 -DisableUpdaterArtifacts:([System.Convert]::ToBoolean($env:DISABLE_UPDATER_ARTIFACTS))
          Write-Host "::endgroup::"

      - name: Normalizar artefatos Tauri
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.disable_updater_artifacts != 'true' }}
        timeout-minutes: 2
        shell: bash
        run: |
          echo "[step] normalizando artefatos Tauri: $(date -u +%FT%TZ)"
          npm run normalize:tauri-assets
          echo "[step] artefatos normalizados: $(date -u +%FT%TZ)"

      - name: Listar bundle (pré geração latest.json)
        if: always()
        timeout-minutes: 2
        shell: pwsh
        run: |
          Write-Host "::group::árvore bundle"
          Write-Host "[step] listando src-tauri\target\release\bundle"
          if (Test-Path "src-tauri\target\release\bundle") { cmd /c "dir src-tauri\target\release\bundle /s" } else { Write-Host "(pasta bundle não existe)" }
          Write-Host "::endgroup::"

      - name: Gerar latest.json (passo explícito, idempotente)
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.tauri_targets != 'msi' && github.event.inputs.disable_updater_artifacts != 'true') }}
        timeout-minutes: 3
        env:
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          echo "[step] gerando latest.json: $(date -u +%FT%TZ)"
          node scripts/generate-latest-json.mjs
          echo "[step] latest.json gerado: $(date -u +%FT%TZ)"

      - name: Validar latest.json (campos obrigatórios + URL + assinatura)
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.tauri_targets != 'msi' && github.event.inputs.disable_updater_artifacts != 'true') }}
        timeout-minutes: 3
        env:
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          REQUIRE_LOCAL_ASSETS: "true"
        shell: bash
        run: |
          echo "[step] validando latest.json local: $(date -u +%FT%TZ)"
          node scripts/validate-latest-json.mjs
          echo "[step] validação local OK: $(date -u +%FT%TZ)"

      - name: Listar artefatos do bundle
        timeout-minutes: 2
        shell: bash
        run: |
          echo "[step] listagem final dos bundles"
          echo "== NSIS =="
          ls -la src-tauri/target/release/bundle/nsis/ || true
          echo "== MSI =="
          ls -la src-tauri/target/release/bundle/msi/ || true

      - name: Copiar latest.json para a raiz dos artefatos
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.tauri_targets != 'msi' && github.event.inputs.disable_updater_artifacts != 'true') }}
        timeout-minutes: 2
        shell: bash
        run: |
          echo "[step] preparando release-assets/"
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/nsis/latest.json release-assets/latest.json
          cp src-tauri/target/release/bundle/nsis/*.exe       release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.exe.sig   release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi        release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi.sig    release-assets/ 2>/dev/null || true
          echo "[step] conteúdo de release-assets/:"
          ls -la release-assets/
          if ! ls release-assets/*.exe >/dev/null 2>&1; then
            echo "::error::Nenhum .exe em release-assets/"
            exit 1
          fi
          if ! ls release-assets/*.exe.sig >/dev/null 2>&1; then
            echo "::error::Nenhum .exe.sig em release-assets/ — build assinado falhou silenciosamente?"
            exit 1
          fi

      - name: Publicar na GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.tauri_targets != 'msi' && github.event.inputs.disable_updater_artifacts != 'true') }}
        timeout-minutes: 10
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: "true"
          files: |
            release-assets/latest.json
            release-assets/*.exe
            release-assets/*.exe.sig
            release-assets/*.msi
            release-assets/*.msi.sig

      - name: Validar assets publicados no GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.tauri_targets != 'msi' && github.event.inputs.disable_updater_artifacts != 'true') }}
        timeout-minutes: 5
        env:
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          CHECK_REMOTE_URLS: "true"
        shell: bash
        run: node scripts/validate-latest-json.mjs
