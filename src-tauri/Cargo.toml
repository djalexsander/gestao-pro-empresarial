[package]
name = "gestao-pro"
version = "1.1.0"
description = "Gestão Pro — sistema de gestão empresarial"
authors = ["AlexPro Apps"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "gestao_pro_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-store = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Backend HTTP local (Servidor Local)
axum = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "net", "signal", "time"] }
tower-http = { version = "0.5", features = ["cors"] }
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
hostname = "0.4"

# Banco local (SQLite embutido) — inicia a camada de persistência local real.
# `bundled` evita depender do SQLite do sistema; gera build self-contained.
rusqlite = { version = "0.31", features = ["bundled"] }
dirs = "5"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
